name: Bug report
description: Report a problem with the mvac CLI, web UI, prompts, or models
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report.

        Please avoid including secrets, tokens (e.g. `OPENROUTER_API_KEY`), private links, or personal data.
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output (redact tokens)
      description: Paste relevant output. Please redact tokens and personal paths if needed.
      render: shell
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Python version (python3 --version):
        - Install method (pip -e . / pipx):
        - Command(s) run:
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I verified this is not a security issue (if it is, I will email `contact@messyvirgo.com` instead).
          required: true
        - label: I removed any API keys, tokens, or personal data from this report.
          required: true
