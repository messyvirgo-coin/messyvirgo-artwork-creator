schema: spec-driven

context: |
  Repository: https://github.com/messyvirgo-coin/messyvirgo-artwork-creator
  Messy Virgo Artwork Creator — Python CLI package `mv_artwork_creator`, entry point `mvac`
  (also `python3 -m mv_artwork_creator`). Generators: `avatar`, `scene`, `messy-fy`. Post-process:
  `remove-background`, `sharpen`. Local UI: `web`. Documentation: README.md only (no runbook).

  Bundled YAML under `mv_artwork_creator/resources/`: `avatar_prompts.yaml`, `scene_prompts.yaml`,
  `messy_fy_prompts.yaml`, `models.yaml`. Default models per task are defined in `models.yaml`
  (aliases `seedream`, `nano-banana`); `.env` needs only `OPENROUTER_API_KEY` for normal use.

  Optional `rembg` extra for local AI matting — CPU/RAM heavy; generators do not require it.
